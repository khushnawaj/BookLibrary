<!doctype html>
<html lang="en" class="dark" data-palette="midnight" data-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ShelfForge - A modern social platform for book lovers" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>ShelfForge - Forge Your Personal Library</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('bookverse_theme');
          if (!raw) return;
          var theme = JSON.parse(raw);
          var root = document.documentElement;
          if (theme.palette) root.setAttribute('data-palette', theme.palette);
          if (theme.mode) {
            root.setAttribute('data-mode', theme.mode);
            root.classList.toggle('dark', theme.mode === 'dark');
            root.classList.toggle('light', theme.mode === 'light');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
